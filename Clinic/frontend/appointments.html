<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Appointments</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav>
        <a href="index.html">Dashboard</a>
        <a href="doctors.html">Doctors</a>
        <a href="patients.html">Patients</a>
        <a href="appointments.html">Appointments</a>
        <a href="medicines.html">Medicines</a>
        <a href="medical-records.html">Medical Records</a>
        <a href="prescriptions.html">Prescriptions</a>
    </nav>

    <div id="message"></div>

    <h1>Appointments Management</h1>

    <div>
        <h2>Schedule New Appointment</h2>
        <form onsubmit="handleAddAppointment(event)">
            <input type="number" id="doctorId" placeholder="Doctor ID" required>
            <input type="number" id="patientId" placeholder="Patient ID" required>
            <input type="datetime-local" id="startDate" required>
            <input type="datetime-local" id="endDate" required>
            <input type="text" id="reason" placeholder="Reason for Visit" required>
            <select id="status" required>
                <option value="PENDING">Pending</option>
                <option value="CONFIRMED">Confirmed</option>
                <option value="COMPLETED">Completed</option>
                <option value="CANCELLED">Cancelled</option>
            </select>
            <button type="submit">Schedule</button>
        </form>
    </div>

    <div>
        <h2>Filters</h2>
        <label>Patient ID: <input type="number" id="filterPatientId" onchange="filterAppointments()"></label>
        <label>Status: 
            <select id="filterStatus" onchange="filterAppointments()">
                <option value="">All</option>
                <option value="PENDING">Pending</option>
                <option value="CONFIRMED">Confirmed</option>
                <option value="COMPLETED">Completed</option>
                <option value="CANCELLED">Cancelled</option>
            </select>
        </label>
        <button onclick="loadAppointments()">Clear Filters</button>
    </div>

    <div>
        <h2>Appointments List</h2>
        <button onclick="loadAppointments()">Refresh List</button>
        <div id="appointmentsList"></div>
    </div>

    <div id="testLog">
        <h2>Test Results</h2>
        <pre id="output" style="height: 400px; overflow-y: auto;"></pre>
    </div>

    <button onclick="runCRUDTests()" style="margin-bottom: 2rem;">Run CRUD Tests</button>

    <script src="common.js"></script>
    <script>
        let logMessages = [];
        let allAppointments = [];

        function log(msg) {
            logMessages.push(msg);
            document.getElementById('output').textContent = logMessages.join('\n');
        }

        async function loadAppointments() {
            try {
                allAppointments = await apiGet('/appointments');
                displayAppointments(allAppointments);
            } catch (error) {
                showMessage('Failed to load appointments: ' + error.message, 'error');
            }
        }

        function filterAppointments() {
            let filtered = allAppointments;
            const patientId = document.getElementById('filterPatientId').value;
            const status = document.getElementById('filterStatus').value;

            if (patientId) {
                filtered = filtered.filter(a => a.patientId == patientId);
            }
            if (status) {
                filtered = filtered.filter(a => a.status === status);
            }
            displayAppointments(filtered);
        }

        function displayAppointments(appointments) {
            let html = '<div class="card-grid">';
            if (appointments.length === 0) {
                html = '<p style="grid-column: 1/-1; text-align: center; padding: 2rem;">No appointments found</p>';
            } else {
                appointments.forEach(a => {
                    const statusClass = `status-${a.status.toLowerCase()}`;
                    html += `
                    <div class="card">
                        <div class="card-header">Appointment #${a.id}</div>
                        <div class="card-body">
                            <div class="card-field">
                                <label>Doctor ID</label>
                                <div class="card-field-value">#${a.doctorId}</div>
                            </div>
                            <div class="card-field">
                                <label>Patient ID</label>
                                <div class="card-field-value">#${a.patientId}</div>
                            </div>
                            <div class="card-field">
                                <label>Reason</label>
                                <div class="card-field-value">${a.reason}</div>
                            </div>
                            <div class="card-field">
                                <label>Start Date</label>
                                <div class="card-field-value">${a.appointmentStartDate}</div>
                            </div>
                            <div class="card-field">
                                <label>End Date</label>
                                <div class="card-field-value">${a.appointmentEndDate}</div>
                            </div>
                            <div class="card-field">
                                <label>Status</label>
                                <div class="card-field-value"><span class="${statusClass}">${a.status}</span></div>
                            </div>
                        </div>
                        <div class="card-footer">
                            <button onclick="updateStatus(${a.id})">Update Status</button>
                            <button onclick="deleteAppointment(${a.id})" style="background: #e74c3c;">Delete</button>
                        </div>
                    </div>`;
                });
            }
            html += '</div>';
            document.getElementById('appointmentsList').innerHTML = html;
        }

        async function handleAddAppointment(event) {
            event.preventDefault();
            try {
                const startDateTime = document.getElementById('startDate').value;
                const endDateTime = document.getElementById('endDate').value;
                
                const data = {
                    doctorId: parseInt(document.getElementById('doctorId').value),
                    patientId: parseInt(document.getElementById('patientId').value),
                    appointmentStartDate: startDateTime.replace('T', ' ') + ':00',
                    appointmentEndDate: endDateTime.replace('T', ' ') + ':00',
                    reason: document.getElementById('reason').value,
                    status: document.getElementById('status').value
                };
                const result = await apiPost('/appointments', data);
                showMessage('Appointment scheduled successfully!', 'success');
                event.target.reset();
                loadAppointments();
            } catch (error) {
                showMessage('Failed to schedule appointment: ' + error.message, 'error');
            }
        }

        async function updateStatus(id) {
            const newStatus = prompt('Enter new status (PENDING, CONFIRMED, COMPLETED, CANCELLED):');
            if (!newStatus) return;
            try {
                await apiPut(`/appointments/${id}`, { status: newStatus });
                showMessage('Appointment status updated!', 'success');
                loadAppointments();
            } catch (error) {
                showMessage('Failed to update appointment: ' + error.message, 'error');
            }
        }

        async function deleteAppointment(id) {
            if (!confirm('Are you sure you want to delete this appointment?')) return;
            try {
                await apiDelete(`/appointments/${id}`);
                showMessage('Appointment deleted successfully!', 'success');
                loadAppointments();
            } catch (error) {
                showMessage('Failed to delete appointment: ' + error.message, 'error');
            }
        }

        async function runCRUDTests() {
            logMessages = [];
            log('=== Appointment CRUD Test Suite ===');
            log('');

            try {
                // Test 1: Create
                log('Test 1: Creating an appointment...');
                const newApt = {
                    doctorId: 1,
                    patientId: 1,
                    appointmentStartDate: '2026-05-15 10:00:00',
                    appointmentEndDate: '2026-05-15 11:00:00',
                    reason: 'Annual checkup',
                    status: 'PENDING'
                };
                const result = await apiPost('/appointments', newApt);
                const aptId = result.id;
                log(`[OK] Created appointment with ID: ${aptId}`);
                log('');

                // Test 2: Read
                log('Test 2: Reading the created appointment...');
                const apt = await apiGet(`/appointments/${aptId}`);
                log(`[OK] Retrieved: ${apt.reason} (${apt.status})`);
                log('');

                // Test 3: Update Status
                log('Test 3: Updating appointment status...');
                await apiPut(`/appointments/${aptId}`, { status: 'CONFIRMED' });
                const updated = await apiGet(`/appointments/${aptId}`);
                log(`[OK] Status updated to: ${updated.status}`);
                log('');

                // Test 4: List with Filter
                log('Test 4: Filtering appointments by patient...');
                const apts = await apiGet(`/appointments?patientId=1`);
                log(`[OK] Found ${apts.length} appointment(s) for patient 1`);
                log('');

                // Test 5: Delete
                log('Test 5: Deleting the test appointment...');
                await apiDelete(`/appointments/${aptId}`);
                log(`[OK] Appointment ${aptId} deleted`);

            } catch (error) {
                log(`[FAIL] Test failed: ${error.message}`);
            }

            log('');
            log('=== Tests Complete ===');
            loadAppointments();
        }

        window.addEventListener('load', loadAppointments);
    </script>
</body>
</html>
