<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Doctor Management</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav>
        <a href="index.html">Dashboard</a>
        <a href="doctors.html">Doctors</a>
        <a href="patients.html">Patients</a>
        <a href="appointments.html">Appointments</a>
        <a href="medicines.html">Medicines</a>
        <a href="medical-records.html">Medical Records</a>
        <a href="prescriptions.html">Prescriptions</a>
    </nav>

    <div id="message"></div>

    <h1>Doctor Management</h1>

    <div>
        <h2>Add New Doctor</h2>
        <form onsubmit="handleAddDoctor(event)">
            <input type="number" id="userId" placeholder="User ID" required>
            <input type="text" id="fullName" placeholder="Full Name" required>
            <input type="text" id="specialty" placeholder="Specialty" required>
            <input type="text" id="phone" placeholder="Phone" required>
            <input type="email" id="email" placeholder="Email" required>
            <input type="text" id="roomNumber" placeholder="Room Number" required>
            <button type="submit">Add Doctor</button>
        </form>
    </div>

    <div>
        <h2>Doctors List</h2>
        <button onclick="loadDoctors()">Refresh List</button>
        <div id="doctorsList"></div>
    </div>

    <div id="editPanel" style="display: none;">
        <h2>Edit Doctor</h2>
        <form onsubmit="handleEditDoctor(event)">
            <input type="hidden" id="editId">
            <input type="text" id="editFullName" placeholder="Full Name" required>
            <input type="text" id="editSpecialty" placeholder="Specialty" required>
            <input type="email" id="editEmail" placeholder="Email" required>
            <input type="text" id="editRoomNumber" placeholder="Room Number" required>
            <button type="submit">Save Changes</button>
            <button type="button" onclick="cancelEdit()">Cancel</button>
        </form>
    </div>

    <div id="testLog">
        <h2>Test Results</h2>
        <pre id="output" style="height: 400px; overflow-y: auto;"></pre>
    </div>

    <button onclick="runCRUDTests()" style="margin-bottom: 2rem;">Run CRUD Tests</button>

    <script src="common.js"></script>
    <script>
        let logMessages = [];
        let allDoctors = [];

        function log(msg) {
            logMessages.push(msg);
            document.getElementById('output').textContent = logMessages.join('\n');
        }

        async function loadDoctors() {
            try {
                allDoctors = await apiGet('/doctors');
                let html = '<div class="card-grid">';
                allDoctors.forEach(d => {
                    html += `
                    <div class="card">
                        <div class="card-header">Dr. ${d.fullName}</div>
                        <div class="card-body">
                            <div class="card-field">
                                <label>Specialty</label>
                                <div class="card-field-value">${d.specialty}</div>
                            </div>
                            <div class="card-field">
                                <label>Room Number</label>
                                <div class="card-field-value">${d.roomNumber}</div>
                            </div>
                            <div class="card-field">
                                <label>Email</label>
                                <div class="card-field-value">${d.email}</div>
                            </div>
                            <div class="card-field">
                                <label>Phone</label>
                                <div class="card-field-value">${d.phone}</div>
                            </div>
                            <div class="card-field">
                                <label>ID</label>
                                <div class="card-field-value">#${d.id}</div>
                            </div>
                        </div>
                        <div class="card-footer">
                            <button onclick="editDoctor(${d.id})">Edit</button>
                            <button onclick="deleteDoctor(${d.id})" style="background: #e74c3c;">Delete</button>
                        </div>
                    </div>`;
                });
                html += '</div>';
                document.getElementById('doctorsList').innerHTML = html;
            } catch (error) {
                showMessage('Failed to load doctors: ' + error.message, 'error');
            }
        }

        async function handleAddDoctor(event) {
            event.preventDefault();
            try {
                const data = {
                    userId: parseInt(document.getElementById('userId').value),
                    fullName: document.getElementById('fullName').value,
                    specialty: document.getElementById('specialty').value,
                    phone: document.getElementById('phone').value,
                    email: document.getElementById('email').value,
                    roomNumber: document.getElementById('roomNumber').value
                };
                const result = await apiPost('/doctors', data);
                showMessage('Doctor added successfully!', 'success');
                event.target.reset();
                loadDoctors();
            } catch (error) {
                showMessage('Failed to add doctor: ' + error.message, 'error');
            }
        }

        function editDoctor(id) {
            const doctor = allDoctors.find(d => d.id === id);
            if (doctor) {
                document.getElementById('editId').value = id;
                document.getElementById('editFullName').value = doctor.fullName;
                document.getElementById('editSpecialty').value = doctor.specialty;
                document.getElementById('editEmail').value = doctor.email;
                document.getElementById('editRoomNumber').value = doctor.roomNumber;
                document.getElementById('editPanel').style.display = 'block';
            }
        }

        async function handleEditDoctor(event) {
            event.preventDefault();
            try {
                const id = parseInt(document.getElementById('editId').value);
                const data = {
                    fullName: document.getElementById('editFullName').value,
                    specialty: document.getElementById('editSpecialty').value,
                    email: document.getElementById('editEmail').value,
                    roomNumber: document.getElementById('editRoomNumber').value
                };
                await apiPut(`/doctors/${id}`, data);
                showMessage('Doctor updated successfully!', 'success');
                cancelEdit();
                loadDoctors();
            } catch (error) {
                showMessage('Failed to update doctor: ' + error.message, 'error');
            }
        }

        function cancelEdit() {
            document.getElementById('editPanel').style.display = 'none';
        }

        async function deleteDoctor(id) {
            if (!confirm('Are you sure you want to delete this doctor?')) return;
            try {
                await apiDelete(`/doctors/${id}`);
                showMessage('Doctor deleted successfully!', 'success');
                loadDoctors();
            } catch (error) {
                showMessage('Failed to delete doctor: ' + error.message, 'error');
            }
        }

        async function runCRUDTests() {
            logMessages = [];
            log('=== Doctor CRUD Test Suite ===');
            log('');

            // Test 1: Create
            log('Test 1: Creating a doctor...');
            try {
                const newDoc = {
                    userId: 1,
                    fullName: 'Dr. Test Smith',
                    specialty: 'General Practice',
                    phone: '555-0001',
                    email: 'test@clinic.com',
                    roomNumber: 'Room 1'
                };
                const result = await apiPost('/doctors', newDoc);
                const docId = result.id;
                log(`[OK] Created doctor with ID: ${docId}`);
                log('');

                // Test 2: Read
                log('Test 2: Reading the created doctor...');
                const doc = await apiGet(`/doctors/${docId}`);
                log(`[OK] Retrieved: ${doc.fullName} (${doc.specialty})`);
                log('');

                // Test 3: Update
                log('Test 3: Updating the doctor...');
                const updateData = {
                    fullName: 'Dr. Updated Smith',
                    specialty: 'Cardiology',
                    email: 'updated@clinic.com',
                    roomNumber: 'Room 2'
                };
                await apiPut(`/doctors/${docId}`, updateData);
                log('[OK] Doctor updated');
                const updated = await apiGet(`/doctors/${docId}`);
                log(`[OK] Verified: ${updated.fullName} now in ${updated.roomNumber}`);
                log('');

                // Test 4: List All
                log('Test 4: Listing all doctors...');
                const doctors = await apiGet('/doctors');
                log(`[OK] Total doctors in system: ${doctors.length}`);
                log('');

                // Test 5: Delete
                log('Test 5: Deleting the test doctor...');
                await apiDelete(`/doctors/${docId}`);
                log(`[OK] Doctor ${docId} deleted`);

            } catch (error) {
                log(`[FAIL] Test failed: ${error.message}`);
            }

            log('');
            log('=== Tests Complete ===');
            loadDoctors();
        }

        window.addEventListener('load', loadDoctors);
    </script>
</body>
</html>
